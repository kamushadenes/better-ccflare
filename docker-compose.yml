# Default (SQLite): docker compose up
# With PostgreSQL: docker compose --profile postgres up
#   Then uncomment DATABASE_URL in better-ccflare service environment

services:
  better-ccflare:
    image: ghcr.io/tombii/better-ccflare:latest
    container_name: better-ccflare
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Persist database
      - better-ccflare-data:/data
      # Optional: mount custom config
      # - ./config:/app/config:ro
    environment:
      - NODE_ENV=production
      - BETTER_CCFLARE_DB_PATH=/data/better-ccflare.db
      # Optional: configure logging
      # - LOG_LEVEL=info
      # PostgreSQL mode (uncomment when using --profile postgres):
      # - DATABASE_URL=postgresql://ccflare:${POSTGRES_PASSWORD:-ccflare}@postgres:5432/better_ccflare
    # Load environment variables from .env file (optional)
    # Create a .env file in the same directory as docker-compose.yml
    env_file:
      - .env  # Optional: load from .env file
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    container_name: better-ccflare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: better_ccflare
      POSTGRES_USER: ccflare
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ccflare}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccflare -d better_ccflare"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  better-ccflare-data:
    driver: local
  postgres-data:
    driver: local
